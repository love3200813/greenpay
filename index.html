<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&T 生活小物 | 專業綠界雲端商店</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #FFF9F5; 
            --primary-color: #FF6B6B; 
            --text-color: #4A3728; 
            --white: #ffffff; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            position: relative;
        }

        /* 導覽列 */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 5%; 
            background: var(--white); 
            position: fixed; 
            top: 0;
            width: 100%; 
            height: 60px; 
            z-index: 1000;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }

        .logo { font-size: 1.1rem; font-weight: bold; color: var(--primary-color); letter-spacing: 1px; cursor: pointer; }

        .cart-icon { position: relative; cursor: pointer; font-size: 1.2rem; }
        .cart-count { 
            position: absolute; top: -8px; right: -8px; 
            background: var(--primary-color); color: white; 
            border-radius: 50%; width: 18px; height: 18px; 
            font-size: 10px; display: flex; align-items: center; justify-content: center; 
        }

        /* 購物車側邊欄 */
        #cartSidebar { 
            position: fixed; right: -100%; top: 0; 
            width: 85%; max-width: 320px; height: 100vh; 
            background: var(--white); z-index: 2000; 
            transition: 0.3s ease-in-out; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
        }
        #cartSidebar.active { right: 0; }

        .cart-header { padding: 25px 25px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        #cartItemsList { flex-grow: 1; overflow-y: auto; padding: 0 25px; }
        .cart-footer { padding: 20px 25px; background: #fff; border-top: 1px solid #eee; }

        /* 商品卡片優化 */
        .hero { 
            margin-top: 60px;
            height: 30vh; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1513519245088-0e12902e5a38?auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; text-align: center;
        }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px 4%; }
        
        .product-card { 
            background: white; border-radius: 12px; overflow: hidden; 
            border: 1px solid #eee; display: flex; flex-direction: column;
            transition: transform 0.2s;
        }
        
        .product-img { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background-size: cover; 
            background-position: center; 
            background-color: #f9f9f9;
        }

        .product-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        .product-info h4 {
            font-size: 0.9rem; margin-bottom: 5px; color: #333;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            height: 2.6em; line-height: 1.3;
        }

        .product-info p.desc {
            font-size: 0.75rem; color: #888; margin-bottom: 10px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            height: 2.4em; line-height: 1.2;
        }

        /* 按鈕與表單 */
        .btn-main { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .btn-main:active { opacity: 0.8; }
        
        #checkout-site { display: none; padding: 80px 5% 40px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }

        @media (min-width: 768px) { 
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } 
            .product-img { height: 220px; }
        }
    </style>
</head>
<body>

    <nav id="topNav">
        <div class="logo" onclick="goHome()">C&T生活小物</div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fa-solid fa-basket-shopping"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </nav>

    <div id="cartSidebar">
        <div class="cart-header">
            <h3>確認清單</h3>
            <span onclick="toggleCart()" style="cursor:pointer; font-size:1.8rem;">&times;</span>
        </div>
        <div id="cartItemsList"></div>
        <div id="cartFooterWrap" class="cart-footer" style="display: none;">
            <button class="btn-main" onclick="startCheckout()">下一步：填寫資料</button>
        </div>
    </div>

    <main id="main-site">
        <header class="hero">
            <h1>拾起生活的溫度</h1>
            <p>簡單小物，點亮你的日常</p>
        </header>
        <div class="product-grid" id="productGrid">
            <p style="grid-column:1/-1; text-align:center; padding:50px; color:#999;">商品同步中...</p>
        </div>
    </main>

    <section id="checkout-site">
        <div style="max-width:500px; margin:auto; background:white; padding:25px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
            <h3 style="text-align:center; margin-bottom:20px;">訂單結帳 (信用卡)</h3>
            <div id="checkoutSummary" style="background:#fffcf9; padding:15px; border-radius:10px; border:1px dashed #ffd8d8; margin-bottom:20px;"></div>
            
            <input type="text" id="custName" placeholder="收件人姓名">
            <input type="text" id="custPhone" placeholder="收件人電話" inputmode="tel">
            <input type="text" id="custLine" placeholder="LINE ID">
            <input type="text" id="custAddr" placeholder="完整配送地址">
            
            <button class="btn-main" id="submitBtn" onclick="submitOrder()">前往信用卡付款</button>
            <p onclick="goHome()" style="text-align:center; margin-top:20px; color:#aaa; cursor:pointer; font-size:0.9rem; text-decoration: underline;">回商店繼續逛逛</p>
        </div>
    </section>

    <form id="ecpayForm" method="POST" action="https://payment.ecpay.com.tw/Cashier/AioCheckOut/V5" style="display:none;"></form>

    <script>
        // ⚠ 請確保這裡填入的是你最新部署的 GAS 網址
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzoRc8kdVdED8gKTrGv06SfM3Q8JZJ67lpeXtoihhS0crQOq7utqp8FA4j1RcmgjRO/exec"; 
        let cart = {};

        async function fetchProducts() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const products = await response.json();
                
                // 修正：過濾掉描述中的網址，並確保圖片顯示
                document.getElementById('productGrid').innerHTML = products.map(p => {
                    const cleanDesc = p.Description ? p.Description.replace(/http[s]?:\/\/\S+/g, '').trim() : "";
                    return `
                    <div class="product-card">
                        <div class="product-img" style="background-image: url('${p.ImgUrl}')"></div>
                        <div class="product-info">
                            <div>
                                <h4>${p.Name}</h4>
                                <p class="desc">${cleanDesc || "優質嚴選生活小物"}</p>
                            </div>
                            <div>
                                <p style="color:var(--primary-color); font-weight:bold; margin-bottom:8px;">NT$ ${p.Price}</p>
                                <button class="btn-main" onclick="addToCart('${p.Name}', ${p.Price})">加入購物車</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) { 
                document.getElementById('productGrid').innerHTML = "<p style='grid-column:1/-1; text-align:center;'>連線超時，請重新整理網頁。</p>";
            }
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
        function goHome() { 
            document.getElementById('main-site').style.display="block"; 
            document.getElementById('checkout-site').style.display="none"; 
            window.scrollTo(0,0); 
        }

        function addToCart(name, price) {
            if (cart[name]) { cart[name].qty += 1; } else { cart[name] = { price, qty: 1 }; }
            updateUI();
            toggleCart();
        }

        function updateUI() {
            const list = document.getElementById('cartItemsList');
            let totalQty = 0; let html = "";
            for (let name in cart) {
                totalQty += cart[name].qty;
                html += `
                    <div style="padding:15px 0; border-bottom:1px solid #eee;">
                        <div style="display:flex; justify-content:space-between;">
                            <strong style="font-size:0.9rem;">${name}</strong>
                            <span style="color:var(--primary-color);">$${cart[name].price * cart[name].qty}</span>
                        </div>
                        <div style="margin-top:8px;">
                            <button onclick="changeQty('${name}', -1)" style="width:25px;">-</button>
                            <span style="margin:0 10px;">${cart[name].qty}</span>
                            <button onclick="changeQty('${name}', 1)" style="width:25px;">+</button>
                        </div>
                    </div>`;
            }
            list.innerHTML = html || "<p style='color:#ccc; text-align:center; padding:30px;'>購物清單是空的</p>";
            document.getElementById('cartCount').innerText = totalQty;
            document.getElementById('cartFooterWrap').style.display = totalQty > 0 ? "block" : "none";
        }

        function changeQty(name, delta) {
            cart[name].qty += delta;
            if (cart[name].qty <= 0) delete cart[name];
            updateUI();
        }

        function startCheckout() {
            document.getElementById('main-site').style.display = "none";
            document.getElementById('checkout-site').style.display = "block";
            toggleCart();
            let total = 0; let html = "";
            for (let name in cart) {
                let sub = cart[name].price * cart[name].qty; total += sub;
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${name} x ${cart[name].qty}</span><span>$${sub}</span></div>`;
            }
            document.getElementById('checkoutSummary').innerHTML = html + `<div style='text-align:right; font-weight:bold; color:var(--primary-color); border-top:1px solid #eee; padding-top:10px;'>總金額: NT$ ${total}</div>`;
        }

        async function submitOrder() {
            const btn = document.getElementById('submitBtn');
            const orderData = {
                action: "createPayment",
                customerName: document.getElementById('custName').value,
                customerPhone: document.getElementById('custPhone').value,
                customerLine: document.getElementById('custLine').value,
                address: document.getElementById('custAddr').value,
                items: Object.keys(cart).map(k => `${k}(x${cart[k].qty})`).join(', '),
                totalAmount: Object.values(cart).reduce((s,v)=>s+(v.price*v.qty), 0)
            };

            if(!orderData.customerName || !orderData.customerPhone || !orderData.address) return alert("請填寫完整資訊");

            btn.innerText = "處理中..."; btn.disabled = true;

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(orderData)
                });
                const result = await response.json();
                if (result.status === "success") {
                    const form = document.getElementById('ecpayForm');
                    form.innerHTML = "";
                    for (const key in result.params) {
                        const input = document.createElement('input');
                        input.type = 'hidden'; input.name = key; input.value = result.params[key];
                        form.appendChild(input);
                    }
                    form.submit();
                } else { alert("錯誤：" + result.message); }
            } catch (e) { alert("連線失敗"); btn.disabled = false; btn.innerText = "前往付款"; }
        }

        fetchProducts();
    </script>
</body>
</html>
