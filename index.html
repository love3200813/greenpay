<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&T 生活小物雲端市集</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #FFF9F5; --primary-color: #FF6B6B; --text-color: #4A3728; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang TC", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: var(--white); height: 60px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.1rem; font-weight: bold; color: var(--primary-color); cursor: pointer; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.2rem; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: var(--primary-color); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        
        .hero { height: 30vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1513519245088-0e12902e5a38?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px 4%; }
        .product-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; transition: 0.3s; }
        .product-img { width: 100%; aspect-ratio: 1/1; background-size: cover; background-position: center; background-color: #f9f9f9; }
        .product-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        #cartSidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 320px; height: 100vh; background: var(--white); z-index: 2000; transition: 0.3s; box-shadow: -5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #cartSidebar.active { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #checkout-site { display: none; padding: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.reload()">C&T生活小物</div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fa-solid fa-basket-shopping"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </nav>

    <div id="cartSidebar">
        <div class="cart-header"><h3>購物清單</h3><span onclick="toggleCart()" style="cursor:pointer; font-size:1.5rem;">&times;</span></div>
        <div id="cartItemsList" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div id="cartFooter" style="padding:20px; display:none;"><button class="btn-main" onclick="startCheckout()">下一步：填寫資料</button></div>
    </div>

    <main id="main-site">
        <header class="hero"><h1>拾起生活的溫度</h1><p>簡單小物，點亮你的日常</p></header>
        <div class="product-grid" id="productGrid"><p style="grid-column:1/-1; text-align:center; padding:50px;">商品加載中...</p></div>
    </main>

    <section id="checkout-site">
        <div style="max-width:500px; margin:auto; background:white; padding:20px; border-radius:15px;">
            <h3 style="text-align:center;">訂單結帳</h3>
            <div id="checkoutSummary" style="margin:20px 0; padding:15px; background:#fffcf9; border-radius:10px;"></div>
            <input type="text" id="custName" placeholder="收件人姓名">
            <input type="text" id="custPhone" placeholder="收件人電話">
            <input type="text" id="custLine" placeholder="LINE ID">
            <input type="text" id="custAddr" placeholder="配送地址">
            <button class="btn-main" id="submitBtn" onclick="submitOrder()">確認並支付</button>
            <p onclick="location.reload()" style="text-align:center; margin-top:15px; cursor:pointer; color:#999; text-decoration:underline;">回首頁</p>
        </div>
    </section>

    <form id="ecpayForm" method="POST" action="https://payment.ecpay.com.tw/Cashier/AioCheckOut/V5" style="display:none;"></form>

    <script>
        // ⚠ 這裡要換成你自己的 GAS 網址
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDVjRFR4I0HF2M9y4boWwHW2oAehLKem8Q9j_bded2Z-vVjjYAfHDBxfmWbrmAyxjE/exec"; 
        let cart = {};

        async function fetchProducts() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                const data = await res.json();
                if (data.status === "error") throw new Error(data.message);
                
                document.getElementById('productGrid').innerHTML = data.map(p => `
                    <div class="product-card">
                        <div class="product-img" style="background-image: url('${p.ImgUrl || ''}')"></div>
                        <div class="product-info">
                            <h4>${p.Name}</h4>
                            <p style="color:var(--primary-color); font-weight:bold;">NT$ ${p.Price}</p>
                            <button class="btn-main" onclick="addToCart('${p.Name}', ${p.Price})">加入購物車</button>
                        </div>
                    </div>`).join('');
            } catch (e) {
                document.getElementById('productGrid').innerHTML = `<p style="grid-column:1/-1; color:red;">加載失敗: ${e.message}</p>`;
            }
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }

        function addToCart(name, price) {
            cart[name] = cart[name] ? { price, qty: cart[name].qty + 1 } : { price, qty: 1 };
            updateUI();
            toggleCart();
        }

        function updateUI() {
            const list = document.getElementById('cartItemsList');
            let total = 0, count = 0, html = "";
            for (let name in cart) {
                count += cart[name].qty;
                total += cart[name].price * cart[name].qty;
                html += `<div style="margin-bottom:15px;"><b>${name}</b> x ${cart[name].qty}<br>NT$ ${cart[name].price * cart[name].qty}</div>`;
            }
            list.innerHTML = html || "購物車是空的";
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartFooter').style.display = count > 0 ? "block" : "none";
        }

        function startCheckout() {
            document.getElementById('main-site').style.display = "none";
            document.getElementById('checkout-site').style.display = "block";
            let total = 0, html = "";
            for (let name in cart) { total += cart[name].price * cart[name].qty; html += `<div>${name} x ${cart[name].qty}</div>`; }
            document.getElementById('checkoutSummary').innerHTML = html + `<hr><div style="text-align:right; font-weight:bold; color:red;">總計: NT$ ${total}</div>`;
            toggleCart();
        }

        async function submitOrder() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const addr = document.getElementById('custAddr').value.trim();
            if (!name || !phone || !addr) return alert("請填寫完整資訊");

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "處理中...";

            const orderData = {
                action: "createPayment",
                customerName: name,
                customerPhone: phone,
                customerLine: document.getElementById('custLine').value,
                address: addr,
                items: Object.keys(cart).map(k => `${k}x${cart[k].qty}`).join(','),
                totalAmount: Object.values(cart).reduce((s, v) => s + (v.price * v.qty), 0)
            };

            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: JSON.stringify(orderData) });
                const result = await res.json();
                if (result.status === "success") {
                    const form = document.getElementById('ecpayForm');
                    form.innerHTML = "";
                    for (let key in result.params) {
                        const input = document.createElement('input');
                        input.type = 'hidden'; input.name = key; input.value = result.params[key];
                        form.appendChild(input);
                    }
                    form.submit();
                } else { throw new Error(result.message); }
            } catch (e) {
                alert("下單失敗: " + e.message);
                btn.disabled = false; btn.innerText = "確認並支付";
            }
        }
        fetchProducts();
    </script>
</body>
</html>
